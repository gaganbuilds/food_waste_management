<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Food Waste Prediction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .glass-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="10" r="0.5" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            z-index: -1;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .main-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-circle i {
            font-size: 2rem;
            color: white;
        }

        .main-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .main-header h1 span {
            color: #ffd700;
        }

        .main-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        /* Card Stack */
        .card-stack {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .glass-card,
        .result-card,
        .error-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group.full-width {
            grid-column: 1 / -1;
        }

        .input-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group label i {
            color: #667eea;
        }

        /* Fix: label-inline for the festival toggle label */
        .label-inline {
            font-weight: 600;
            color: #555;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group input,
        .input-group select {
            padding: 0.75rem 1rem;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        /* Toggle Group */
        .toggle-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .toggle-group input[type="radio"] {
            display: none;
        }

        .toggle-group label {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #f8f9fa;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            /* Fix: override the display:flex from .input-group label */
            display: block;
            margin-bottom: 0;
        }

        .toggle-group input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Result Card */
        .result-card {
            display: none;
            text-align: center;
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-color: #c3e6cb;
        }

        .result-card.show {
            display: block;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: #155724;
        }

        .result-header i {
            font-size: 1.5rem;
        }

        .prediction-value {
            font-size: 4rem;
            font-weight: 700;
            color: #28a745;
            margin: 1rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .prediction-value .number {
            font-size: 3rem;
            color: #155724;
        }

        .prediction-value .unit {
            font-size: 1rem;
            font-weight: 400;
            color: #6c757d;
            margin-top: 0.5rem;
        }

        .result-card .insight {
            color: #155724;
            font-size: 1rem;
            margin-top: 1rem;
        }

        /* Error Card */
        .error-card {
            display: none;
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border-color: #f5c6cb;
            color: #721c24;
        }

        .error-card.show {
            display: block;
        }

        .error-card i {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .error-card h3 {
            margin-bottom: 0.5rem;
        }

        /* Animations */
        .animate-up {
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loader */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .loader.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Footer */
        .app-footer {
            text-align: center;
            margin-top: auto;
            padding: 2rem 0;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                padding: 1rem;
            }

            .main-header h1 {
                font-size: 2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .prediction-value {
                font-size: 3rem;
            }

            .prediction-value .number {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="glass-bg"></div>

    <main class="app-container">
        <header class="main-header">
            <div class="logo-circle">
                <i class="fas fa-leaf"></i>
            </div>
            <h1>Food Waste<span> Predictor</span></h1>
            <p>Smart Food Waste Prediction</p>
        </header>

        <section class="card-stack">
            <div class="glass-card">
                <form action="/predict" method="post" id="prediction-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label><i class="fas fa-calendar-day"></i> Day</label>
                            <select name="day_of_week" required>
                                <option value="" disabled selected>Select...</option>
                                <option>Monday</option>
                                <option>Tuesday</option>
                                <option>Wednesday</option>
                                <option>Thursday</option>
                                <option>Friday</option>
                                <option>Saturday</option>
                                <option>Sunday</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-cloud-sun"></i> Weather</label>
                            <select name="weather" required>
                                <option value="" disabled selected>Select...</option>
                                <option>Sunny</option>
                                <option>Cloudy</option>
                                <option>Rainy</option>
                                <option>Stormy</option>
                            </select>
                        </div>

                        <div class="input-group full-width">
                            <label><i class="fas fa-users"></i> Expected Customers</label>
                            <input type="number" name="expected_customers" placeholder="e.g. 150" min="0" required>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-history"></i> Yesterday</label>
                            <input type="number" name="previous_day_consumption" placeholder="Meals sold" min="0" required>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-calendar-check"></i> Last Week</label>
                            <input type="number" name="previous_week_same_day" placeholder="Same day" min="0" required>
                        </div>

                        <div class="input-group full-width">
                            <span class="label-inline">Is it a Festival?</span>
                            <div class="toggle-group">
                                <input type="radio" name="festival" value="0" id="no" checked>
                                <label for="no">Normal Day</label>
                                <input type="radio" name="festival" value="1" id="yes">
                                <label for="yes">Festival</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="predict-btn">
                        <span>Analyze Data</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>

            <!-- Result card: shown by server-side template engine (Jinja2) -->
            <div class="result-card animate-up{% if prediction %} show{% endif %}">
                <div class="result-header">
                    <i class="fas fa-check-circle"></i>
                    <span>Optimized Recommendation</span>
                </div>
                <div class="prediction-value">
                    <span class="number">{{ prediction }}</span>
                    <span class="unit">MEALS</span>
                </div>
                <p class="insight">We suggest preparing this amount to minimize waste while meeting demand.</p>
            </div>

            <!-- Error card: shown by server-side template engine (Jinja2) -->
            <div class="error-card animate-up{% if error %} show{% endif %}">
                <i class="fas fa-circle-exclamation"></i>
                <div>
                    <h3>Oops! Something went wrong</h3>
                    <p>{{ error }}</p>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <p>Smart Food Waste Prediction</p>
        </footer>
    </main>

    <div id="loader" class="loader hidden">
        <div class="spinner"></div>
    </div>

    <script>
        const form = document.getElementById('prediction-form');
        const loader = document.getElementById('loader');
        form.addEventListener('submit', () => loader.classList.remove('hidden'));
    </script>
</body>
</html>
